<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Among Us — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'IBM Plex Mono', monospace;
            background: #04060f;
            color: #d0e8ff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .stars {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: #04060f;
        }

        .container {
            max-width: 450px;
            width: 90%;
            background: rgba(8, 15, 35, 0.6);
            border: 1px solid rgba(100, 160, 255, 0.2);
            border-radius: 20px;
            padding: 50px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0, 229, 160, 0.1);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            color: #00e5a0;
            margin-bottom: 12px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            color: #5a7899;
            font-size: 12px;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 11px;
            color: #4db8ff;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            height: 44px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(100, 160, 255, 0.2);
            border-radius: 8px;
            padding: 0 16px;
            color: #00e5a0;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #4db8ff;
            box-shadow: 0 0 12px rgba(77, 184, 255, 0.2);
        }

        input::placeholder {
            color: rgba(77, 184, 255, 0.5);
        }

        button {
            width: 100%;
            height: 44px;
            background: linear-gradient(135deg, rgba(0, 229, 160, 0.15), rgba(77, 184, 255, 0.15));
            border: 1px solid rgba(0, 229, 160, 0.5);
            border-radius: 8px;
            color: #00e5a0;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 12px;
        }

        button:hover {
            background: rgba(0, 229, 160, 0.2);
            box-shadow: 0 0 20px rgba(0, 229, 160, 0.3);
        }

        button:active {
            transform: scale(0.98);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: #5a7899;
            font-size: 11px;
            letter-spacing: 1px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(100, 160, 255, 0.1);
        }

        .divider span {
            margin: 0 12px;
        }

        .discord-btn {
            background: linear-gradient(135deg, rgba(88, 101, 242, 0.2), rgba(88, 101, 242, 0.05));
            border: 1px solid rgba(88, 101, 242, 0.5);
            color: #5865f2 !important;
        }

        .discord-btn:hover {
            background: rgba(88, 101, 242, 0.3);
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.3);
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 11px;
            color: #5a7899;
        }

        .footer a {
            color: #4db8ff;
            text-decoration: none;
            border-bottom: 1px solid rgba(77, 184, 255, 0.3);
        }

        .footer a:hover {
            border-bottom-color: #4db8ff;
        }

        .error {
            background: rgba(255, 59, 92, 0.1);
            border: 1px solid rgba(255, 59, 92, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 24px;
            font-size: 11px;
            color: #ff3b5c;
            letter-spacing: 0.5px;
        }

        .loading {
            display: none;
            text-align: center;
            color: #4db8ff;
            font-size: 12px;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(77, 184, 255, 0.3);
            border-top-color: #4db8ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <h1>🚀 LOGIN</h1>
        <p class="subtitle">Among Us Panel v3</p>

        <div id="error" class="error" style="display: none;"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Benutzername</label>
                <input type="text" id="username" placeholder="Dein Benutzername…" required>
            </div>
            <div class="form-group">
                <label>Passwort</label>
                <input type="password" id="password" placeholder="Dein Passwort…" required>
            </div>
            <button type="submit">🔓 Einloggen</button>
            <div class="loading" id="loading">
                <div class="spinner"></div> Wird angemeldet…
            </div>
        </form>

        <div class="divider">
            <span>ODER</span>
        </div>

        <button class="discord-btn" onclick="loginWithDiscord()">
            💜 Mit Discord anmelden
        </button>

        <div class="footer">
            <p>Noch kein Konto? <a href="/register">Jetzt registrieren →</a></p>
        </div>
    </div>

    <script>
        // Fehler aus URL-Parametern anzeigen
        const params = new URLSearchParams(window.location.search);
        const error = params.get('error');
        if (error) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = '❌ ' + decodeURIComponent(error);
            errorDiv.style.display = 'block';
            window.history.replaceState({}, document.title, '/login');
        }

        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';

            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
                .then(r => r.json())
                .then(data => {
                    if (data.ok) {
                        window.location.href = '/';
                    } else {
                        showError(data.error || 'Login fehlgeschlagen');
                        document.getElementById('loading').style.display = 'none';
                    }
                })
                .catch(err => {
                    showError('Netzwerkfehler: ' + err.message);
                    document.getElementById('loading').style.display = 'none';
                });
        }

        function loginWithDiscord() {
            window.location.href = '/auth/discord';
        }

        function showError(msg) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = '❌ ' + msg;
            errorDiv.style.display = 'block';
        }
    </script>
</body>
</html>
